<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft DS Box - ASCII Animated</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .ascii-art {
            color: #00ff88;
            font-size: 1.5rem;
            line-height: 1.6;
            white-space: pre;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5),
                         0 0 20px rgba(0, 255, 136, 0.3),
                         0 0 30px rgba(0, 255, 136, 0.2);
            font-weight: bold;
            letter-spacing: 0.05em;
            user-select: none;
        }

        /* Animación 1: Borde pulsante */
        .pulse-border {
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5),
                             0 0 20px rgba(0, 255, 136, 0.3),
                             0 0 30px rgba(0, 255, 136, 0.2);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 255, 136, 0.8),
                             0 0 40px rgba(0, 255, 136, 0.6),
                             0 0 60px rgba(0, 255, 136, 0.4);
                transform: scale(1.05);
            }
        }

        /* Animación 2: Caracteres individuales pulsantes */
        .pulse-chars .char {
            display: inline-block;
            animation: pulse-char 1.5s ease-in-out infinite;
        }

        .pulse-chars .char.box {
            animation: pulse-box 2s ease-in-out infinite;
        }

        @keyframes pulse-char {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        @keyframes pulse-box {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.6;
                transform: scale(1.15);
            }
        }

        /* Animación 3: Onda vertical en las letras */
        .wave-vertical .char {
            display: inline-block;
            animation: wave-vertical 1.2s ease-in-out infinite;
        }

        .wave-vertical .char.box {
            animation: none;
        }

        @keyframes wave-vertical {
            0%, 100% { 
                transform: translateY(0px);
            }
            50% { 
                transform: translateY(-8px);
            }
        }

        /* Animación 4: Brillo que recorre horizontalmente */
        .shine-horizontal .char {
            display: inline-block;
            position: relative;
            animation: shine-sweep 3s linear infinite;
        }

        .shine-horizontal .char.box {
            animation: shine-sweep-box 3s linear infinite;
        }

        @keyframes shine-sweep {
            0%, 100% { 
                color: #00ff88;
                text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
            }
            50% { 
                color: #ffffff;
                text-shadow: 0 0 15px rgba(0, 255, 136, 0.9),
                            0 0 25px rgba(0, 255, 136, 0.7),
                            0 0 35px rgba(0, 255, 136, 0.5);
            }
        }

        @keyframes shine-sweep-box {
            0%, 100% { 
                color: #00ff88;
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            }
            50% { 
                color: #00ffff;
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.9),
                            0 0 30px rgba(0, 255, 255, 0.7);
            }
        }

        /* Animación 5: Color shift en las letras */
        .color-shift .char {
            display: inline-block;
            animation: color-shift 3s ease-in-out infinite;
        }

        .color-shift .char.box {
            color: #00ff88;
            animation: pulse-box 2s ease-in-out infinite;
        }

        @keyframes color-shift {
            0% { color: #00ff88; }
            25% { color: #00ffff; }
            50% { color: #ff00ff; }
            75% { color: #ffff00; }
            100% { color: #00ff88; }
        }

        /* Animación 6: Rotación 3D de la caja completa */
        .rotate-3d {
            animation: rotate-3d 4s ease-in-out infinite;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        @keyframes rotate-3d {
            0%, 100% { 
                transform: rotateY(0deg) rotateX(0deg);
            }
            25% { 
                transform: rotateY(90deg) rotateX(5deg);
            }
            50% { 
                transform: rotateY(180deg) rotateX(0deg);
            }
            75% { 
                transform: rotateY(270deg) rotateX(-5deg);
            }
        }

        /* Animación 7: Caracteres aparecen uno por uno */
        .typewriter .char {
            opacity: 0;
            animation: typewriter-char 0.3s forwards;
        }

        .typewriter .char.box {
            opacity: 1;
            animation: none;
        }

        @keyframes typewriter-char {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animación 8: Combinada - Pulsante con onda */
        .combined-box {
            animation: pulse-border 2s ease-in-out infinite;
        }

        .combined-box .char:not(.box) {
            display: inline-block;
            animation: wave-vertical 1.2s ease-in-out infinite, pulse-char 1.5s ease-in-out infinite;
        }

        .combined-box .char.box {
            animation: pulse-box 2s ease-in-out infinite;
        }

        /* Controles */
        .controls {
            margin-top: 3rem;
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            transition: all 0.3s;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn:hover {
            background: rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        .btn.active {
            background: rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        /* Delays escalonados para caracteres */
        .char:nth-child(1) { animation-delay: 0s; }
        .char:nth-child(2) { animation-delay: 0.05s; }
        .char:nth-child(3) { animation-delay: 0.1s; }
        .char:nth-child(4) { animation-delay: 0.15s; }
        .char:nth-child(5) { animation-delay: 0.2s; }
        .char:nth-child(6) { animation-delay: 0.25s; }
        .char:nth-child(7) { animation-delay: 0.3s; }
        .char:nth-child(8) { animation-delay: 0.35s; }
        .char:nth-child(9) { animation-delay: 0.4s; }
        .char:nth-child(10) { animation-delay: 0.45s; }
        .char:nth-child(11) { animation-delay: 0.5s; }
        .char:nth-child(12) { animation-delay: 0.55s; }
        .char:nth-child(13) { animation-delay: 0.6s; }
        .char:nth-child(14) { animation-delay: 0.65s; }
        .char:nth-child(15) { animation-delay: 0.7s; }
        .char:nth-child(16) { animation-delay: 0.75s; }
        .char:nth-child(17) { animation-delay: 0.8s; }
        .char:nth-child(18) { animation-delay: 0.85s; }
        .char:nth-child(19) { animation-delay: 0.9s; }
        .char:nth-child(20) { animation-delay: 0.95s; }
        .char:nth-child(21) { animation-delay: 1.0s; }
        .char:nth-child(22) { animation-delay: 1.05s; }
        .char:nth-child(23) { animation-delay: 1.1s; }
        .char:nth-child(24) { animation-delay: 1.15s; }
        .char:nth-child(25) { animation-delay: 1.2s; }
    </style>
</head>
<body>
    <div class="container">
        <div id="ascii-container" class="ascii-art combined-box">
            <!-- El contenido se genera con JavaScript -->
        </div>
        
        <div class="controls">
            <button class="btn active" onclick="changeAnimation('combined-box', this)">Combinada</button>
            <button class="btn" onclick="changeAnimation('pulse-border', this)">Borde Pulsante</button>
            <button class="btn" onclick="changeAnimation('pulse-chars', this)">Chars Pulsantes</button>
            <button class="btn" onclick="changeAnimation('wave-vertical', this)">Onda Vertical</button>
            <button class="btn" onclick="changeAnimation('shine-horizontal', this)">Brillo Horizontal</button>
            <button class="btn" onclick="changeAnimation('color-shift', this)">Color Shift</button>
            <button class="btn" onclick="changeAnimation('rotate-3d', this)">Rotación 3D</button>
            <button class="btn" onclick="changeAnimation('typewriter', this)">Typewriter</button>
        </div>
    </div>

    <script>
        const asciiContent = `┌─┬─┬─┬─┬─┬─┬─┬─┐
│C│R│A│F│T│#│D│S│
└─┴─┴─┴─┴─┴─┴─┴─┘`;

        // Caracteres que son parte de la caja (bordes)
        const boxChars = ['┌', '─', '┬', '┐', '│', '└', '┴', '┘'];

        function createCharSpans(text, indexOffset = 0) {
            let charIndex = indexOffset;
            return text.split('').map(char => {
                const delay = charIndex * 0.05;
                const isBox = boxChars.includes(char);
                const charClass = isBox ? 'char box' : 'char';
                charIndex++;
                const escapedChar = char === ' ' ? '&nbsp;' : char;
                return `<span class="${charClass}" style="animation-delay: ${delay}s">${escapedChar}</span>`;
            }).join('');
        }

        function changeAnimation(animationType, button) {
            const container = document.getElementById('ascii-container');
            const buttons = document.querySelectorAll('.btn');
            
            // Remover todas las clases de animación
            container.className = 'ascii-art';
            
            // Actualizar botones activos
            buttons.forEach(btn => btn.classList.remove('active'));
            if (button) button.classList.add('active');
            
            // Recrear el contenido con los caracteres
            const lines = asciiContent.split('\n');
            let charIndex = 0;
            container.innerHTML = lines.map(line => {
                const lineHtml = `<div>${createCharSpans(line, charIndex)}</div>`;
                charIndex += line.length + 1; // +1 por el salto de línea
                return lineHtml;
            }).join('');
            
            // Aplicar la nueva clase de animación
            container.classList.add(animationType);
            
            // Para typewriter, necesitamos resetear y animar de nuevo
            if (animationType === 'typewriter') {
                const chars = container.querySelectorAll('.char:not(.box)');
                chars.forEach((char, index) => {
                    char.style.animationDelay = `${index * 0.1}s`;
                });
            }
        }

        // Inicializar con animación combinada
        window.addEventListener('load', () => {
            const lines = asciiContent.split('\n');
            const container = document.getElementById('ascii-container');
            let charIndex = 0;
            container.innerHTML = lines.map(line => {
                const lineHtml = `<div>${createCharSpans(line, charIndex)}</div>`;
                charIndex += line.length + 1;
                return lineHtml;
            }).join('');
            container.classList.add('combined-box');
        });
    </script>
</body>
</html>
