<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft DS - ASCII Animated</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .ascii-art {
            color: #00ff88;
            font-size: 1.2rem;
            line-height: 1.6;
            white-space: pre;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5),
                         0 0 20px rgba(0, 255, 136, 0.3),
                         0 0 30px rgba(0, 255, 136, 0.2);
            font-weight: bold;
            letter-spacing: 0.1em;
        }

        /* Animación 1: Efecto de escritura (Typing) */
        .typing .line {
            overflow: hidden;
            border-right: 2px solid #00ff88;
            white-space: nowrap;
            animation: typing 3s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #00ff88; }
        }

        /* Animación 2: Parpadeo de caracteres */
        .blink .char {
            display: inline-block;
            animation: blink-char 2s infinite;
        }

        .blink .char:nth-child(2n) {
            animation-delay: 0.1s;
        }

        .blink .char:nth-child(3n) {
            animation-delay: 0.2s;
        }

        @keyframes blink-char {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Animación 3: Glow pulsante */
        .glow {
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5),
                            0 0 20px rgba(0, 255, 136, 0.3),
                            0 0 30px rgba(0, 255, 136, 0.2);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 255, 136, 0.8),
                            0 0 40px rgba(0, 255, 136, 0.6),
                            0 0 60px rgba(0, 255, 136, 0.4);
            }
        }

        /* Animación 4: Color cambiante */
        .color-shift {
            animation: color-shift 3s ease-in-out infinite;
        }

        @keyframes color-shift {
            0% { color: #00ff88; }
            25% { color: #00ffff; }
            50% { color: #ff00ff; }
            75% { color: #ffff00; }
            100% { color: #00ff88; }
        }

        /* Animación 5: Onda de caracteres */
        .wave .char {
            display: inline-block;
            animation: wave 1.5s ease-in-out infinite;
        }

        .wave .char:nth-child(1) { animation-delay: 0s; }
        .wave .char:nth-child(2) { animation-delay: 0.1s; }
        .wave .char:nth-child(3) { animation-delay: 0.2s; }
        .wave .char:nth-child(4) { animation-delay: 0.3s; }
        .wave .char:nth-child(5) { animation-delay: 0.4s; }
        .wave .char:nth-child(6) { animation-delay: 0.5s; }
        .wave .char:nth-child(7) { animation-delay: 0.6s; }
        .wave .char:nth-child(8) { animation-delay: 0.7s; }
        .wave .char:nth-child(9) { animation-delay: 0.8s; }
        .wave .char:nth-child(10) { animation-delay: 0.9s; }
        .wave .char:nth-child(11) { animation-delay: 1.0s; }
        .wave .char:nth-child(12) { animation-delay: 1.1s; }
        .wave .char:nth-child(13) { animation-delay: 1.2s; }
        .wave .char:nth-child(14) { animation-delay: 1.3s; }
        .wave .char:nth-child(15) { animation-delay: 1.4s; }

        @keyframes wave {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Controles */
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            transition: all 0.3s;
            border-radius: 4px;
        }

        .btn:hover {
            background: rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .btn.active {
            background: rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        /* Versión combinada (por defecto) */
        .combined {
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .combined .char {
            display: inline-block;
            animation: wave 1.5s ease-in-out infinite;
        }

        .combined .char:nth-child(1) { animation-delay: 0s; }
        .combined .char:nth-child(2) { animation-delay: 0.1s; }
        .combined .char:nth-child(3) { animation-delay: 0.2s; }
        .combined .char:nth-child(4) { animation-delay: 0.3s; }
        .combined .char:nth-child(5) { animation-delay: 0.4s; }
        .combined .char:nth-child(6) { animation-delay: 0.5s; }
        .combined .char:nth-child(7) { animation-delay: 0.6s; }
        .combined .char:nth-child(8) { animation-delay: 0.7s; }
        .combined .char:nth-child(9) { animation-delay: 0.8s; }
        .combined .char:nth-child(10) { animation-delay: 0.9s; }
        .combined .char:nth-child(11) { animation-delay: 1.0s; }
        .combined .char:nth-child(12) { animation-delay: 1.1s; }
        .combined .char:nth-child(13) { animation-delay: 1.2s; }
        .combined .char:nth-child(14) { animation-delay: 1.3s; }
        .combined .char:nth-child(15) { animation-delay: 1.4s; }
    </style>
</head>
<body>
    <div class="container">
        <div id="ascii-container" class="ascii-art">
            <!-- El contenido se genera con JavaScript -->
        </div>
        
        <div class="controls">
            <button class="btn active" onclick="changeAnimation('combined', this)">Combinada</button>
            <button class="btn" onclick="changeAnimation('glow', this)">Glow Pulsante</button>
            <button class="btn" onclick="changeAnimation('color-shift', this)">Color Shift</button>
            <button class="btn" onclick="changeAnimation('wave', this)">Onda</button>
            <button class="btn" onclick="changeAnimation('blink', this)">Parpadeo</button>
            <button class="btn" onclick="changeAnimation('typing', this)">Typing</button>
        </div>
    </div>

    <script>
        const asciiContent = `-----------------------
| C R A F T - D S |
-----------------------`;

        function createCharSpans(text, indexOffset = 0) {
            let charIndex = indexOffset;
            return text.split('').map(char => {
                const delay = charIndex * 0.1;
                charIndex++;
                return `<span class="char" style="animation-delay: ${delay}s">${char === ' ' ? '&nbsp;' : char}</span>`;
            }).join('');
        }

        function changeAnimation(animationType, button) {
            const container = document.getElementById('ascii-container');
            const buttons = document.querySelectorAll('.btn');
            
            // Remover todas las clases de animación
            container.className = 'ascii-art';
            
            // Actualizar botones activos
            buttons.forEach(btn => btn.classList.remove('active'));
            if (button) button.classList.add('active');
            
            if (animationType === 'typing') {
                container.innerHTML = `
                    <div class="line">-----------------------</div>
                    <div class="line">| C R A F T - D S |</div>
                    <div class="line">-----------------------</div>`;
                container.classList.add('typing');
            } else {
                const lines = asciiContent.split('\n');
                let charIndex = 0;
                container.innerHTML = lines.map(line => {
                    const lineHtml = `<div>${createCharSpans(line, charIndex)}</div>`;
                    charIndex += line.length;
                    return lineHtml;
                }).join('');
                container.classList.add(animationType);
            }
        }

        // Inicializar con animación combinada
        window.addEventListener('load', () => {
            const lines = asciiContent.split('\n');
            const container = document.getElementById('ascii-container');
            let charIndex = 0;
            container.innerHTML = lines.map(line => {
                const lineHtml = `<div>${createCharSpans(line, charIndex)}</div>`;
                charIndex += line.length;
                return lineHtml;
            }).join('');
            container.classList.add('combined');
        });
    </script>
</body>
</html>
